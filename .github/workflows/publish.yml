name: Publish package to the Maven Central Repository and GitHub Packages
on:
  release:
    types: [created]
jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # The artifact targets release 21, so it can only be built/run on JDK 21+.
        java: [ 21, 25 ]
    env:
      OS: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

  publish_github:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java for publishing to GitHub Packages
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
      - name: Publish to GitHub Packages
        run: mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Maven Central is published manually via the Sonatype Central Portal
  # (mvn -P release deploy), not from CI -- the retired OSSRH job was removed.
